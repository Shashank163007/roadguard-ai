<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadGuard AI — Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --cyan: #00f5ff;
            --black: #000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* Animated Grid Background */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveGrid 20s linear infinite;
            z-index: -2;
        }
        @keyframes moveGrid {
            from { transform: translate(0, 0); }
            to { transform: translate(-40px, -40px); }
        }
        /* Scanline Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,245,255,0.015) 3px,
                transparent 3px
            );
            z-index: -1;
            pointer-events: none;
        }
        .login-card {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,245,255,0.3);
            border-radius: 16px;
            padding: 48px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.15);
        }
        .shield {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            color: var(--cyan);
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
            margin-bottom: 4px;
        }
        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }
        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.5;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--cyan);
            border-radius: 8px;
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .btn-primary:hover:not(:disabled) {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .or-divider {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin: 8px 0 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .or-divider::before, .or-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-google {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .login-link {
            margin-top: 32px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        .login-link a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        #error-div {
            color: #ff3d3d;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            background: rgba(255, 61, 61, 0.1);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 61, 61, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="shield">🛡️</span>
        <h1>ROADGUARD AI</h1>
        <p class="subtitle">CREATE ACCOUNT</p>
        <div class="divider-line"></div>
        
        <div id="error-div"></div>
        
        <form id="signup-form">
            <input type="text" id="fullname" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required minlength="6">
            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
            <button type="submit" id="submit-btn" class="btn-primary">[ CREATE ACCOUNT ]</button>
        </form>
        
        <div class="or-divider">— OR —</div>
        
        <button id="google-btn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/callback/google.svg" width="18" alt="Google">
            [ SIGN UP WITH GOOGLE ]
        </button>
        
        <div class="login-link">
            Already have an account? <a href="index.html">LOGIN</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAA3EYPcFTR22-wVd4DY6UltOxQccGYuvo",
            authDomain: "roadguard-ai-be3ab.firebaseapp.com",
            projectId: "roadguard-ai-be3ab",
            storageBucket: "roadguard-ai-be3ab.firebasestorage.app",
            messagingSenderId: "1044552939790",
            appId: "1:1044552939790:web:ff26b74022b973f1b9bf5f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'app.html';
        });

        const signupForm = document.getElementById('signup-form');
        const fullnameInput = document.getElementById('fullname');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const googleBtn = document.getElementById('google-btn');
        const errorDiv = document.getElementById('error-div');

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';

            if (passwordInput.value !== confirmInput.value) {
                showError("Passwords do not match");
                return;
            }

            if (passwordInput.value.length < 6) {
                showError("Password should be at least 6 characters");
                return;
            }

            submitBtn.textContent = 'AUTHENTICATING...';
            submitBtn.disabled = true;

            const email = emailInput.value;
            const password = passwordInput.value;
            const fullName = fullnameInput.value;

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return userCredential.user.updateProfile({
                        displayName: fullName
                    }).then(() => {
                        window.location.href = 'app.html';
                    });
                })
                .catch(err => {
                    showError(err.message);
                    submitBtn.textContent = '[ CREATE ACCOUNT ]';
                    submitBtn.disabled = false;
                });
        });

        googleBtn.addEventListener('click', () => {
            errorDiv.style.display = 'none';
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(() => {
                    window.location.href = 'app.html';
                })
                .catch(err => {
                    showError(err.message);
                });
        });
    </script>
</body>
</html>
