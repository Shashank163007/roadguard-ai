<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>

        .status-ready { background: rgba(0,255,136,0.2); color: #00ff88; border: 1px solid #00ff88; }

        .status-error { background: rgba(255,61,61,0.3); color: #ff3d3d; border: 1px solid #ff3d3d; }

        .hud-section { flex: 1; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.08); }

        .road-clear { color: #00ff88; text-align: center; font-family: 'Orbitron', sans-serif; font-size: 12px; padding: 20px 0; }
        .risk-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .risk-value { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; }

        .stat-label { font-size: 9px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 16px; color: #00f5ff; }

        .activate-btn:hover { background: rgba(0,245,255,0.1); box-shadow: 0 0 30px rgba(0,245,255,0.5); }

    </style>

    <canvas id="detection-canvas"></canvas>
    
    <div class="hud-top-bar">

                <span class="feature-item">Lane Monitoring</span>

            <button class="activate-btn" id="activate-btn">[ ACTIVATE SYSTEM ]</button>

    </div>
    
    <script>

        function detectLanes() { if (!state.isCameraActive || video.readyState !== 4) return; const tempCanvas = document.createElement('canvas'), tempCtx = tempCanvas.getContext('2d'); tempCanvas.width = video.videoWidth; tempCanvas.height = video.videoHeight; tempCtx.drawImage(video, 0, 0); const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height), data = imageData.data, width = tempCanvas.width, height = tempCanvas.height; const bottomStartY = Math.floor(height * 0.55), edgePixels = new Set(); for (let py = bottomStartY; py < height - 1; py += 2) { for (let px = 0; px < width - 1; px += 2) { const idx = (py * width + px) * 4, luminance = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2], rightIdx = idx + 4, rightLuminance = 0.299 * data[rightIdx] + 0.587 * data[rightIdx + 1] + 0.114 * data[rightIdx + 2]; if (Math.abs(luminance - rightLuminance) > 25) edgePixels.add(px + ',' + py); } } const leftThird = Math.floor(width / 3), rightTwoThird = Math.floor(width * 2 / 3), centerStart = Math.floor(width * 0.4), centerEnd = Math.floor(width * 0.6); let leftLaneY = -1, rightLaneY = -1; for (let py = height - 1; py >= bottomStartY; py--) { if (leftLaneY === -1) { for (let px = 0; px < leftThird; px++) { if (edgePixels.has(px + ',' + py)) { leftLaneY = py; break; } } } if (rightLaneY === -1) { for (let px = rightTwoThird; px < width; px++) { if (edgePixels.has(px + ',' + py)) { rightLaneY = py; break; } } } if (leftLaneY !== -1 && rightLaneY !== -1) break; } let centerHasEdges = false; for (let py = bottomStartY; py < height; py++) { for (let px = centerStart; px < centerEnd; px++) { if (edgePixels.has(px + ',' + py)) { centerHasEdges = true; break; } } if (centerHasEdges) break; } const now = Date.now(); if (!centerHasEdges && leftLaneY !== -1 && rightLaneY !== -1 && now - state.lastLaneDepWarn > CFG.COOLDOWNS.LANE) { state.laneDepartureActive = true; state.lastLaneDepWarn = now; speakWarning('Lane departure warning. Return to your         function checkNightMode() { if (!state.isCameraActive || video.readyState !== 4) return; const tempCanvas = document.createElement('canvas'), tempCtx = tempCanvas.getContext('2d'); tempCanvas.width = 10; tempCanvas.height = 10; tempCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, 10, 10); const imageData = tempCtx.getImageData(0, 0, 10, 10), data = imageData.data; let totalLuminance = 0; for (let i = 0; i < data.length; i += 4) { const luminance = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]; totalLuminance += luminance / 255; } const avgLuminance = totalLuminance / (10 * 10); const wasNightMode = state.isNightMode; state.isNightMode = avgLuminance < CFG.LUMINANCE_THRESHOLD / 255; }
        function calculateRiskScore() { let score = 0; state.currentDetections.forEach(det => { if (det.config.label === 'PEDESTRIAN') score += 30; else if (det.config.label === 'MOTORCYCLE') score += 20; else if (['CAR', 'TRUCK', 'BUS'].includes(det.config.label)) score += 15; else if (det.config.label === 'CYCLIST') score += 10; }); state.riskScore = Math.min(score, CFG.RISK_CAP); }
        function drawRiskGauge() { const score = state.riskScore; let color = '#00ff88', riskClass = 'risk-low'; if (score > 70) { color = '#ff3d3d'; riskClass = 'risk-high'; } else if (score > 30) { color = '#ffb300'; riskClass = 'risk-medium'; } riskCtx.clearRect(0, 0, riskCanvas.width, riskCanvas.height); const cx = riskCanvas.width / 2, cy = riskCanvas.height / 2, radius = 30; riskCtx.beginPath(); riskCtx.arc(cx, cy, radius, 0, 2 * Math.PI); riskCtx.strokeStyle = 'rgba(255,255,255,0.1)'; riskCtx.lineWidth = 8; riskCtx.stroke(); riskCtx.beginPath(); const startAngle = -Math.PI / 2, endAngle = (-Math.PI / 2) + (2 * Math.PI * (score / 100)); riskCtx.arc(cx, cy, radius, startAngle, endAngle, false); riskCtx.strokeStyle = color; riskCtx.lineWidth = 8; riskCtx.lineCap = 'round'; riskCtx.stroke(); riskValueEl.textContent = score; riskValueEl.className = 'risk-value ' + riskClass; }
        function updateThreatList() { if (state.currentDetections.length === 0) { threatList.innerHTML = '<div class="road-clear">— ROAD CLEAR —</div>'; return; } let html = ''; state.currentDetections.forEach(det => { html += '<div class="threat-item"><span class="threat-icon">' + det.config.icon + '</span><span class="threat-name">' + det.config.label + '</span><span class="threat-confidence">' + Math.round(det.score * 100) + '%</span></div>'; }); threatList.innerHTML = html; }
        function updateStats() { statFps.textContent = state.fps; statObjects.textContent = state.totalObjects; statAlerts.textContent = state.alertCount; statDetections.textContent = state.detectionCount; }
        function updateUI() { calculateRiskScore(); drawRiskGauge(); updateThreatList(); updateStats(); updateSessionTimer(); }
        async function init() { updateClock(); clockInterval = setInterval(updateClock, 1000); updateStatusBadge('loading'); try { await setupCamera(); await loadModel(); } catch (e) { console.error('Init error:', e); updateStatusBadge('error'); return; } updateStatusBadge('ready'); activateBtn.addEventListener('click', async () => { try { await setupCamera(); await loadModel(); centerOverlay.classList.add('hidden'); state.isDetecting = true; state.sessionStart = Date.now(); updateStatusBadge('live'); const warmup = new SpeechSynthesisUtterance(''); warmup.volume = 0; speechSynthesis.speak(warmup); detectionLoop(); nightCheckInterval = setInterval(checkNightMode, 2000); uiUpdateInterval = setInterval(updateUI, 300); statsUpdateInterval = setInterval(updateStats, 500); setInterval(processVoiceQueue, 200); } catch (e) { console.error('Activation error:', e); } }); }
        if (!window.speechSynthesis) { const banner = document.createElement('div'); banner.className = 'voice-unavailable-banner'; banner.textContent = '🔇 Voice alerts unavailable — Visual warnings only'; document.body.appendChild(banner); }
        init();
    })();
    </script>
